version: "3.9"

services:

  # ── Main service: the application ─────────────
  taskflow:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: taskflow-app

    ports:
      - "${APP_PORT:-3000}:80"

    environment:
      - NODE_ENV=${NODE_ENV:-development}

    volumes:
      - taskflow-web:/usr/share/nginx/html

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 30s
      timeout:  5s
      retries:  3

    networks:
      - taskflow-network
volumes:
  taskflow-web:
    driver: local

networks:
  taskflow-network:
    driver: bridge